name: Next Build

on:
  push:
    branches: [main, astro-erudite-design]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build Next.js site
        run: npm run build

      - name: Verify Pagefind output
        run: test -d public/pagefind
